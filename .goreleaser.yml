version: 2

project_name: cloudflared-setup-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: cloudflared-setup-cli
    main: .
    binary: cloudflared-setup-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: adityarizkyramadhan
    name: cloudflared-setup-cli
  name_template: "v{{ .Version }}"
